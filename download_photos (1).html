async function downloadOne(url, filename) {
  const response = await fetch(url);
  const blob = await response.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

async function startDownload() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const bar = document.getElementById('bar');
  btn.disabled = true;
  
  let ok = 0, fail = 0;
  
  for (let i = 0; i < urls.length; i++) {
    const url = urls[i];
    const filename = url.split('/').pop();
    try {
      await downloadOne(url, filename);
      ok++;
    } catch(e) {
      fail++;
    }
    
    bar.style.width = Math.round((i+1)/urls.length*100) + '%';
    if (i % 5 === 0) {
      status.innerHTML = `✅ ${ok} скачано | ❌ ${fail} ошибок | ${i+1}/${urls.length}`;
    }
    await new Promise(r => setTimeout(r, 300));
  }
  
  status.innerHTML = `🎉 Готово! ✅ ${ok} скачано | ❌ ${fail} ошибок`;
  btn.textContent = '✅ Готово!';
}
</script>
